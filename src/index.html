<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>agentdeck</title>
<link rel="stylesheet" href="https://unpkg.com/@xterm/xterm@5.5.0/css/xterm.css">
<style>
  :root {
    --bg: #0a0c10;
    --panel: #11141a;
    --panel-hi: #171b23;
    --border: #1e2230;
    --border-hi: #2b3142;
    --text: #c6cdda;
    --text-dim: #939aa8;
    --muted: #646a78;
    --muted-dim: #454b58;
    --accent: #a88b55;
    --claude: #a774d6;
    --codex: #5a97e0;
    --qwen:   #3bb388;
    --hermes: #d268a0;
    --err:    #cc6666;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Helvetica Neue", Arial, sans-serif;
  }
  header {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 {
    margin: 0;
    font-size: 14px;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  header .sub { color: var(--muted); font-size: 11px; }
  main#workspace {
    padding: 0;
    height: calc(100vh - 32px - 28px);  /* header + footer */
    display: grid;
    grid-template-columns: 1fr 0;
    transition: grid-template-columns 0.15s ease;
  }
  main#workspace.has-sessions {
    grid-template-columns: minmax(360px, 420px) 1fr;
  }
  .profile-panel {
    overflow-y: auto;
    padding: 10px 14px;
    min-width: 0;
  }
  .sessions-panel {
    display: none;
    flex-direction: column;
    min-width: 0;
    background: #2e3440;  /* nord0, matches terminal bg */
    border-left: 1px solid var(--border);
  }
  main#workspace.has-sessions .sessions-panel { display: flex; }
  .tabbar {
    display: flex;
    gap: 2px;
    padding: 3px 4px 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    font: 11px var(--mono);
    color: var(--muted);
    background: var(--panel-hi);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    white-space: nowrap;
    max-width: 240px;
    flex-shrink: 0;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    background: #2e3440;  /* match terminal bg */
    border-color: var(--border-hi);
  }
  .tab.exited { color: var(--muted-dim); font-style: italic; }
  .tab .dot {
    font-size: 7px;
    line-height: 1;
    color: var(--qwen);
  }
  .tab.exited .dot { color: var(--muted-dim); }
  .tab .label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }
  .tab .close {
    color: var(--muted);
    padding: 0 1px;
    font-size: 13px;
    line-height: 1;
  }
  .tab .close:hover { color: var(--err); }
  .terms {
    flex: 1;
    position: relative;
    background: #2e3440;
    overflow: hidden;
  }
  .term-holder {
    position: absolute;
    inset: 0;
    padding: 4px 8px 0;
    display: none;
  }
  .term-holder.active { display: block; }
  .status {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 8px;
    font-family: var(--mono);
  }
  .errors {
    background: #1e1313;
    border: 1px solid #3a1e1e;
    color: var(--err);
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
    font-family: var(--mono);
    font-size: 11px;
    white-space: pre-wrap;
  }
  .empty {
    padding: 26px 14px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 5px;
  }
  .empty code { color: var(--claude); font-size: 12px; }
  /* Single-row list: each profile occupies one line; panels expand
     full-width beneath via flex-wrap. Denser than a card grid. */
  .list {
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--panel);
    overflow: hidden;
  }
  .prof {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 4px 10px;
    border-bottom: 1px solid var(--border);
  }
  .prof:last-child { border-bottom: none; }
  .prof:hover { background: #14171f; }
  .prof > .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    min-width: 110px;
    cursor: text;
    position: relative;
  }
  .prof > .name:hover { color: #e8eef8; }
  .prof > .name .alias-hint {
    display: none;
    font-size: 9px;
    color: var(--muted-dim);
    font-weight: 400;
    margin-left: 4px;
    font-family: var(--mono);
  }
  .prof > .name:hover .alias-hint { display: inline; }
  .prof > .name.aliased .real {
    color: var(--muted);
    font-weight: 400;
    font-size: 11px;
    font-family: var(--mono);
    margin-left: 6px;
  }
  .prof > .state {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-width: 68px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
  .prof > .state::before {
    content: "●";
    font-size: 7px;
    color: var(--muted-dim);
    line-height: 1;
  }
  .prof > .state.running {
    color: #88b89a;
  }
  .prof > .state.running::before {
    color: var(--qwen);
  }
  .prof > .state.active::before {
    color: var(--accent);
  }
  .prof > .cwd {
    flex: 1 1 120px;
    min-width: 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .prof > .model {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 50px;
    text-align: right;
  }
  .prof > .panels {
    flex-basis: 100%;
    min-width: 0;
  }
  .badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.07em;
    padding: 1px 6px;
    border-radius: 8px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid transparent;
  }
  .badge.claude { color: var(--claude); border-color: #2c1e40; }
  .badge.codex  { color: var(--codex);  border-color: #1b283c; }
  .badge.qwen   { color: var(--qwen);   border-color: #143127; }
  .badge.hermes { color: var(--hermes); border-color: #36192e; }
  .row {
    display: flex;
    gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    line-height: 1.4;
  }
  .row .k {
    width: 44px;
    color: var(--muted-dim);
    flex-shrink: 0;
  }
  .row .v { color: var(--text-dim); word-break: break-all; }
  .actions {
    display: flex;
    gap: 4px;
  }
  .btn {
    cursor: pointer;
    background: var(--panel-hi);
    color: var(--text);
    border: 1px solid var(--border-hi);
    padding: 3px 9px;
    border-radius: 3px;
    font: 600 11px -apple-system, sans-serif;
    letter-spacing: 0.03em;
  }
  .btn:hover { background: #1f2534; }
  .btn.primary {
    background: #17231c;
    border-color: #264732;
    color: #88b89a;
  }
  .btn.primary:hover { background: #1e2f25; color: #a6d0b6; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.mini {
    padding: 1px 8px;
    font-size: 10px;
    letter-spacing: 0.02em;
  }

  /* panels are inserted inside .prof > .panels; full row width below
     the single-row header. */
  .history, .skill-panel {
    padding: 4px 0 4px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .history.open, .skill-panel.open { display: block; }
  .skill-panel { max-height: 320px; overflow-y: auto; }
  .history .hint, .skill-panel .hint {
    color: var(--muted);
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 1px 4px;
    line-height: 1.3;
  }
  .history .sess {
    display: grid;
    grid-template-columns: 78px 40px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 2px 1px;
    font-size: 11px;
  }
  .history .sess .when {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
  }
  .history .sess .turns {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-align: right;
  }
  .history .sess .prompt {
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history .sess .prompt.empty {
    color: var(--muted-dim);
    font-style: italic;
  }
  .history .empty-state, .skill-panel .empty-state {
    color: var(--muted);
    font-size: 11px;
    padding: 6px 2px;
    text-align: center;
    font-family: var(--mono);
  }
  .skill-panel .skill-list {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    padding: 2px 1px 4px;
  }
  .skill-panel .skill-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    background: var(--panel-hi);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
  }
  .skill-panel .skill-pill.launchable {
    cursor: pointer;
    color: #88b89a;
    border-color: #264732;
    background: #17231c;
  }
  .skill-panel .skill-pill.launchable:hover {
    background: #1e2f25;
    color: #a6d0b6;
  }
  .skill-panel .skill-pill.pinned::before {
    content: "★";
    color: var(--accent);
    font-size: 9px;
    line-height: 1;
  }
  .skill-panel .missing {
    color: var(--err);
    font-size: 10px;
    padding: 4px 1px 0;
    font-family: var(--mono);
  }

  /* env panel */
  .env-panel {
    padding: 4px 0 4px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .env-panel.open { display: block; }
  .env-panel .hint {
    color: var(--muted);
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 1px 4px;
    line-height: 1.3;
  }
  .env-panel .env-row {
    display: grid;
    grid-template-columns: minmax(130px, auto) 1fr;
    gap: 10px;
    padding: 2px 1px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.4;
  }
  .env-panel .env-row .k {
    color: var(--muted);
    word-break: break-all;
  }
  .env-panel .env-row .v {
    color: var(--text-dim);
    word-break: break-all;
  }
  .env-panel .env-row.masked .v {
    color: var(--accent);
  }
  .env-panel .empty-state {
    color: var(--muted);
    font-size: 11px;
    padding: 6px 2px;
    text-align: center;
    font-family: var(--mono);
  }
  footer {
    padding: 5px 14px;
    color: var(--muted-dim);
    font-size: 10px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    background: var(--bg);
    line-height: 1.3;
    flex-shrink: 0;
  }
  html { overflow: hidden; }
  body { display: flex; flex-direction: column; }
  header { flex-shrink: 0; }
</style>
</head>
<body>
<header>
  <h1>agentdeck</h1>
  <span class="sub">local multi-agent launcher</span>
</header>
<main id="workspace">
  <div class="profile-panel">
    <div class="status" id="status">loading…</div>
    <div id="errors"></div>
    <div id="content"></div>
  </div>
  <div class="sessions-panel" id="sessionsPanel">
    <div class="tabbar" id="tabbar"></div>
    <div class="terms" id="terms"></div>
  </div>
</main>
<footer>
  click a profile action to open a tab on the right — multiple tabs run in parallel, switch with a click, × closes (SIGHUP).
</footer>

<script src="https://unpkg.com/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://unpkg.com/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="https://unpkg.com/@xterm/addon-webgl@0.18.0/lib/addon-webgl.js"></script>
<script src="https://unpkg.com/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.js"></script>
<script>
const el = (tag, cls, txt) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
};
const escapeHtml = s =>
  s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const SAMPLE_YAML = `profiles:
  - name: auditui
    cwd: /Users/you/auditit/auditit-tui
    agent: claude          # claude | codex | qwen | hermes
    model: opus            # optional
    skills:                # optional — pins these skills in the panel
      - study              #   (still see all installed skills regardless)
    env: {}                # optional — extra env vars`;

async function loadProfiles() {
  const status = document.getElementById('status');
  const errbox = document.getElementById('errors');
  const content = document.getElementById('content');

  let data;
  try {
    data = await (await fetch('/api/profiles')).json();
  } catch (e) {
    status.textContent = 'fetch /api/profiles failed: ' + e;
    return;
  }

  status.textContent = `config: ${data.config_path}`;

  if (data.errors && data.errors.length) {
    errbox.className = 'errors';
    errbox.textContent = data.errors.join('\n');
  }

  if (!data.config_exists) {
    const empty = el('div', 'empty');
    empty.appendChild(el('div', null, 'no profiles yet'));
    const p = el('div');
    p.style.marginTop = '12px';
    p.innerHTML = 'create <code>' + escapeHtml(data.config_path) + '</code> then reload';
    empty.appendChild(p);
    const sample = el('pre');
    sample.style.cssText = 'margin-top:18px;text-align:left;background:#0a0c10;border:1px solid var(--border);padding:12px;border-radius:6px;font-size:12px';
    sample.textContent = SAMPLE_YAML;
    empty.appendChild(sample);
    content.appendChild(empty);
    return;
  }

  if (!data.profiles.length) {
    content.appendChild(el('div', 'empty', 'config loaded but no valid profiles'));
    return;
  }

  const list = el('div', 'list');
  for (const p of data.profiles) list.appendChild(row(p));
  content.appendChild(list);
}

function row(p) {
  const r = el('div', 'prof');

  // actions first, so they sit flush-left next to the name
  const actions = el('div', 'actions');
  const cont = el('button', 'btn primary', 'cont');
  cont.title = 'continue the most recent session in this cwd';
  cont.onclick = () => openTerminal(p, 'continue');
  const fresh = el('button', 'btn', 'new');
  fresh.title = 'start a fresh agent session';
  fresh.onclick = () => openTerminal(p, 'new');
  const hist = el('button', 'btn', 'hist');
  hist.title = 'past sessions scoped to this profile';
  const sk = el('button', 'btn', 'skl');
  sk.title = `installed skills for ${p.agent}`;
  const ev = el('button', 'btn', 'env');
  ev.title = `parsed ${p.cwd}/.env values`;
  actions.appendChild(cont);
  actions.appendChild(fresh);
  actions.appendChild(hist);
  actions.appendChild(sk);
  actions.appendChild(ev);
  r.appendChild(actions);

  const name = el('span', 'name');
  renderName(name, p);
  name.onclick = () => renameProfile(p, name);
  r.appendChild(name);

  r.appendChild(el('span', 'badge ' + p.agent, p.agent));

  const state = el('span', 'state', '…');
  state.dataset.profile = p.name;
  state.title = 'agent running state and last activity';
  r.appendChild(state);

  const cwd = el('span', 'cwd', p.cwd);
  cwd.title = p.cwd;
  r.appendChild(cwd);

  const model = el('span', 'model', p.model || '—');
  model.title = p.model ? `model: ${p.model}` : 'no model set';
  r.appendChild(model);

  const panels = el('div', 'panels');
  r.appendChild(panels);

  const histPanel = el('div', 'history');
  panels.appendChild(histPanel);
  hist.onclick = () => toggleHistory(p, histPanel, hist);

  const skPanel = el('div', 'skill-panel');
  panels.appendChild(skPanel);
  sk.onclick = () => toggleSkills(p, skPanel, sk);

  const envPanel = el('div', 'env-panel');
  panels.appendChild(envPanel);
  ev.onclick = () => toggleEnv(p, envPanel, ev);

  return r;
}

// name rendering + alias editing ------------------------------------------

let ALIASES = {};

function renderName(node, p) {
  node.innerHTML = '';
  const alias = ALIASES[p.name];
  if (alias) {
    node.classList.add('aliased');
    node.appendChild(document.createTextNode(alias));
    const real = el('span', 'real', p.name);
    node.appendChild(real);
  } else {
    node.classList.remove('aliased');
    node.appendChild(document.createTextNode(p.name));
    const hint = el('span', 'alias-hint', '✎ click to rename');
    node.appendChild(hint);
  }
  node.title = alias
    ? `alias · real name: ${p.name} · click to change`
    : 'click to set a display alias';
}

async function renameProfile(p, nameNode) {
  const current = ALIASES[p.name] || '';
  const next = prompt(
    `Display name for "${p.name}" (empty to clear alias):`,
    current,
  );
  if (next === null) return;
  try {
    const r = await fetch('/api/aliases', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({profile: p.name, alias: next}),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    ALIASES = data.aliases || {};
    renderName(nameNode, p);
  } catch (e) {
    alert('rename failed: ' + e);
  }
}

async function loadAliases() {
  try {
    const r = await fetch('/api/aliases');
    if (!r.ok) return;
    const data = await r.json();
    ALIASES = data.aliases || {};
  } catch {}
}

async function toggleHistory(profile, panel, btn) {
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    btn.textContent = 'hist';
    return;
  }
  panel.classList.add('open');
  btn.textContent = 'hide';
  await renderHistory(profile, panel);
}

async function renderHistory(profile, panel) {
  panel.innerHTML = '';
  panel.appendChild(el('div', 'hint', 'loading…'));

  let data;
  try {
    const r = await fetch(
      '/api/sessions?profile=' + encodeURIComponent(profile.name)
    );
    if (r.status === 503) {
      panel.innerHTML = '';
      panel.appendChild(el('div', 'hint', 'indexing sessions… retry in a few seconds'));
      return;
    }
    if (!r.ok) {
      panel.innerHTML = '';
      panel.appendChild(el('div', 'hint', `/api/sessions → HTTP ${r.status}`));
      return;
    }
    data = await r.json();
  } catch (e) {
    panel.innerHTML = '';
    panel.appendChild(el('div', 'hint', 'fetch failed: ' + e));
    return;
  }

  panel.innerHTML = '';

  if (!data.cwd_scoped) {
    panel.appendChild(el('div', 'hint',
      `hermes sessions are global (not cwd-scoped). showing ${data.considered} session(s) across all cwds.`));
  } else {
    panel.appendChild(el('div', 'hint',
      `${data.sessions.length} of ${data.considered} session(s) in ${profile.cwd}`));
  }

  if (!data.sessions.length) {
    const note = data.considered === 0
      ? `no ${profile.agent} sessions indexed yet`
      : 'no sessions match this cwd — resume-by-history not available';
    panel.appendChild(el('div', 'empty-state', note));
    return;
  }

  for (const s of data.sessions) {
    panel.appendChild(sessionRow(profile, s));
  }
}

function sessionRow(profile, s) {
  const row = el('div', 'sess');
  row.appendChild(el('span', 'when', formatTs(s.last_active_ts)));
  row.appendChild(el('span', 'turns', `${s.turns}t`));
  const prompt = el('span', 'prompt');
  if (s.prompt && s.prompt.trim()) {
    prompt.textContent = s.prompt.trim().replace(/\s+/g, ' ');
  } else {
    prompt.classList.add('empty');
    prompt.textContent = '(no prompt)';
  }
  prompt.title = s.sid;
  row.appendChild(prompt);
  const btn = el('button', 'btn mini primary', 'resume');
  btn.title = 'resume this specific session';
  btn.onclick = () => openTerminal(profile, 'resume', s.sid);
  row.appendChild(btn);
  return row;
}

function formatTs(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${mm}-${dd} ${hh}:${mi}`;
}

// -- skills panel ----------------------------------------------------------

async function toggleSkills(profile, panel, btn) {
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    btn.textContent = 'skl';
    return;
  }
  panel.classList.add('open');
  btn.textContent = 'hide';
  await renderSkills(profile, panel);
}

async function renderSkills(profile, panel) {
  panel.innerHTML = '';
  panel.appendChild(el('div', 'hint', 'loading…'));

  let data;
  try {
    const r = await fetch(
      '/api/skills?profile=' + encodeURIComponent(profile.name)
    );
    if (!r.ok) {
      panel.innerHTML = '';
      panel.appendChild(el('div', 'hint', `/api/skills → HTTP ${r.status}`));
      return;
    }
    data = await r.json();
  } catch (e) {
    panel.innerHTML = '';
    panel.appendChild(el('div', 'hint', 'fetch failed: ' + e));
    return;
  }

  panel.innerHTML = '';

  const hintTxt = data.preload_supported
    ? `${data.skills.length} skill(s) from ${data.skills_dir} — click launch to preload via --skills`
    : `${data.skills.length} skill(s) from ${data.skills_dir} — ${data.agent} has no --skills flag, launch disabled`;
  panel.appendChild(el('div', 'hint', hintTxt));

  if (!data.skills.length) {
    panel.appendChild(el('div', 'empty-state', 'no skills installed'));
  } else {
    const list = el('div', 'skill-list');
    for (const s of data.skills) {
      list.appendChild(skillPill(profile, s, data.preload_supported));
    }
    panel.appendChild(list);
  }

  if (data.missing_pinned && data.missing_pinned.length) {
    const m = el('div', 'missing',
      'profile.skills references skill(s) not found on disk: ' +
      data.missing_pinned.join(', '));
    panel.appendChild(m);
  }
}

// -- env panel ------------------------------------------------------------

async function toggleEnv(profile, panel, btn) {
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    btn.textContent = 'env';
    return;
  }
  panel.classList.add('open');
  btn.textContent = 'hide';
  await renderEnv(profile, panel);
}

async function renderEnv(profile, panel) {
  panel.innerHTML = '';
  panel.appendChild(el('div', 'hint', 'loading…'));

  let data;
  try {
    const r = await fetch('/api/env?profile=' + encodeURIComponent(profile.name));
    if (!r.ok) {
      panel.innerHTML = '';
      panel.appendChild(el('div', 'hint', `/api/env → HTTP ${r.status}`));
      return;
    }
    data = await r.json();
  } catch (e) {
    panel.innerHTML = '';
    panel.appendChild(el('div', 'hint', 'fetch failed: ' + e));
    return;
  }

  panel.innerHTML = '';

  if (!data.exists) {
    panel.appendChild(el('div', 'empty-state', `no .env at ${data.env_path}`));
    return;
  }
  if (data.parse_error) {
    panel.appendChild(el('div', 'hint', data.parse_error));
    return;
  }
  panel.appendChild(el('div', 'hint',
    `${data.entries.length} entry(ies) from ${data.env_path}` +
    ` — secret-ish values masked`));
  if (!data.entries.length) {
    panel.appendChild(el('div', 'empty-state', 'file is empty'));
    return;
  }
  for (const e of data.entries) {
    const row = el('div', 'env-row' + (e.masked ? ' masked' : ''));
    row.appendChild(el('span', 'k', e.key));
    const v = el('span', 'v', e.value || '""');
    v.title = e.masked
      ? `${e.key} is masked; open ${data.env_path} to see the full value`
      : e.key;
    row.appendChild(v);
    panel.appendChild(row);
  }
}

function skillPill(profile, s, launchable) {
  const p = el('span', 'skill-pill');
  if (s.pinned) p.classList.add('pinned');
  if (launchable) {
    p.classList.add('launchable');
    p.title = s.description
      ? `launch · ${s.description}`
      : `launch skill ${s.name} in a new ${profile.agent} session`;
    p.onclick = () => openTerminal(profile, 'new', {skill: s.name});
  } else {
    p.title = `${profile.agent} has no --skills preload flag`
      + (s.description ? `\n\n${s.description}` : '');
  }
  p.appendChild(document.createTextNode(s.name));
  return p;
}

// -- multi-session terminal workspace -------------------------------------

// Nord palette — https://www.nordtheme.com
const NORD_THEME = {
  background: '#2e3440',  // nord0
  foreground: '#d8dee9',  // nord4
  cursor: '#d8dee9',
  cursorAccent: '#2e3440',
  selectionBackground: '#434c5e',  // nord2
  black:         '#3b4252',  // nord1
  red:           '#bf616a',  // nord11
  green:         '#a3be8c',  // nord14
  yellow:        '#ebcb8b',  // nord13
  blue:          '#81a1c1',  // nord9
  magenta:       '#b48ead',  // nord15
  cyan:          '#88c0d0',  // nord8
  white:         '#e5e9f0',  // nord5
  brightBlack:   '#4c566a',  // nord3
  brightRed:     '#bf616a',
  brightGreen:   '#a3be8c',
  brightYellow:  '#ebcb8b',
  brightBlue:    '#81a1c1',
  brightMagenta: '#b48ead',
  brightCyan:    '#8fbcbb',  // nord7
  brightWhite:   '#eceff4',  // nord6
};

const SESSIONS = new Map();  // id -> SessionHandle
let nextId = 0;
let activeId = null;

function openTerminal(profile, mode, optsOrSid) {
  // Accept either a bare sid string (old callers) or {sid?, skill?}.
  let sid, skill;
  if (typeof optsOrSid === 'string' || optsOrSid === undefined) {
    sid = optsOrSid;
  } else {
    sid = optsOrSid.sid;
    skill = optsOrSid.skill;
  }

  const id = ++nextId;

  const holder = el('div', 'term-holder');
  document.getElementById('terms').appendChild(holder);

  const tab = el('div', 'tab');
  const dot = el('span', 'dot', '●');
  const label = el('span', 'label');
  const close = el('span', 'close', '×');
  close.title = 'close session (SIGHUP)';
  close.onclick = (e) => { e.stopPropagation(); closeSession(id); };
  tab.appendChild(dot);
  tab.appendChild(label);
  tab.appendChild(close);
  tab.onclick = () => setActive(id);
  document.getElementById('tabbar').appendChild(tab);

  const term = new Terminal({
    fontFamily: '"SF Mono", ui-monospace, Menlo, monospace',
    fontSize: 13,
    cursorBlink: true,
    theme: NORD_THEME,
    convertEol: false,
    scrollback: 10000,
    allowProposedApi: true,  // required for unicode11 addon
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  // unicode11 updates the char-width table used for CJK / emoji
  // layout; load before open so the first render already uses it.
  try {
    const u11 = new Unicode11Addon.Unicode11Addon();
    term.loadAddon(u11);
    term.unicode.activeVersion = '11';
  } catch (_) { /* addon failed to load; canvas still works */ }
  term.open(holder);
  // WebGL renderer must be attached after open(); if the browser/GPU
  // refuses (context loss, missing WebGL2), fall back silently to the
  // default canvas renderer.
  try {
    const webgl = new WebglAddon.WebglAddon();
    webgl.onContextLoss(() => { try { webgl.dispose(); } catch (_) {} });
    term.loadAddon(webgl);
  } catch (_) { /* canvas fallback */ }
  // The first term.open() can run while the holder is still 0×0 (the
  // sessions-panel only becomes visible when setActive() flips the
  // .has-sessions class, and that layout pass races with our fit()).
  // ResizeObserver handles every transition — initial 0→full,
  // tab switches that toggle display:none, window resizes — without
  // relying on RAF timing.
  const ro = new ResizeObserver(() => {
    try { fit.fit(); } catch (_) {}
  });
  ro.observe(holder);

  const displayName = ALIASES[profile.name] || profile.name;
  let modeLbl = mode;
  if (mode === 'resume' && sid) modeLbl = `resume:${sid.slice(0, 6)}`;
  if (skill) modeLbl += `+${skill}`;
  label.textContent = `${displayName} · ${modeLbl}`;
  tab.title = `${profile.name} · ${profile.agent} · ${modeLbl} · ${profile.cwd}`;

  const url = new URL('/ws/spawn', location.href);
  url.protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  url.searchParams.set('profile', profile.name);
  url.searchParams.set('mode', mode);
  if (mode === 'resume' && sid) url.searchParams.set('sid', sid);
  if (skill) url.searchParams.set('skill', skill);
  url.searchParams.set('cols', String(term.cols));
  url.searchParams.set('rows', String(term.rows));

  const ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  const sess = {
    id, profile, mode, sid, skill,
    ws, term, fit, ro,
    tabEl: tab, dotEl: dot, holderEl: holder,
    state: 'connecting',
  };
  SESSIONS.set(id, sess);

  ws.onopen = () => { sess.state = 'running'; updateTabState(sess); };
  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'exit') {
          term.write('\r\n\x1b[33m[session ended]\x1b[0m\r\n');
          sess.state = 'exited';
          updateTabState(sess);
        } else if (msg.type === 'error') {
          term.write(`\r\n\x1b[31m[error: ${msg.message}]\x1b[0m\r\n`);
          sess.state = 'error';
          updateTabState(sess);
        }
      } catch { /* non-JSON text frame — ignore */ }
    } else {
      term.write(new Uint8Array(ev.data));
    }
  };
  ws.onclose = () => {
    if (sess.state !== 'exited' && sess.state !== 'error') {
      sess.state = 'disconnected';
      updateTabState(sess);
    }
  };
  ws.onerror = () => { sess.state = 'error'; updateTabState(sess); };

  const encoder = new TextEncoder();
  term.onData(data => {
    if (ws.readyState === 1) ws.send(encoder.encode(data));
  });
  term.onResize(({cols, rows}) => {
    if (ws.readyState === 1) {
      ws.send(JSON.stringify({type: 'resize', cols, rows}));
    }
  });

  setActive(id);
}

function updateTabState(sess) {
  const dead = sess.state === 'exited'
    || sess.state === 'disconnected'
    || sess.state === 'error';
  sess.tabEl.classList.toggle('exited', dead);
  sess.dotEl.textContent = dead ? '○' : '●';
}

function setActive(id) {
  for (const s of SESSIONS.values()) {
    s.holderEl.classList.remove('active');
    s.tabEl.classList.remove('active');
  }
  const sess = SESSIONS.get(id);
  if (!sess) return;
  sess.holderEl.classList.add('active');
  sess.tabEl.classList.add('active');
  activeId = id;
  document.getElementById('workspace').classList.add('has-sessions');
  // ResizeObserver in openTerminal handles re-fitting; we only need
  // to give focus to the now-visible terminal.
  requestAnimationFrame(() => sess.term.focus());
}

function closeSession(id) {
  const sess = SESSIONS.get(id);
  if (!sess) return;
  try { sess.ro.disconnect(); } catch {}
  try { sess.ws.close(); } catch {}
  try { sess.term.dispose(); } catch {}
  sess.tabEl.remove();
  sess.holderEl.remove();
  SESSIONS.delete(id);
  if (activeId === id) {
    const next = SESSIONS.keys().next().value;
    if (next != null) setActive(next);
    else {
      activeId = null;
      document.getElementById('workspace').classList.remove('has-sessions');
    }
  }
}

window.addEventListener('resize', () => {
  const sess = SESSIONS.get(activeId);
  if (sess) { try { sess.fit.fit(); } catch {} }
});

function relTime(ts) {
  if (!ts) return '—';
  const secs = Math.floor(Date.now() / 1000) - ts;
  if (secs < 0) return 'future?';
  if (secs < 60) return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

async function pollStatus() {
  let data;
  try {
    const r = await fetch('/api/status');
    if (!r.ok) return;
    data = await r.json();
  } catch { return; }

  for (const [name, s] of Object.entries(data.profiles)) {
    const cell = document.querySelector(
      `.state[data-profile="${CSS.escape(name)}"]`);
    if (!cell) continue;
    cell.classList.remove('running', 'active');
    if (s.running > 0) {
      cell.classList.add('running');
      cell.textContent = s.running === 1 ? 'running' : `run×${s.running}`;
    } else if (s.last_active_ts) {
      cell.classList.add('active');
      cell.textContent = relTime(s.last_active_ts);
    } else {
      cell.textContent = data.session_index_ready ? 'never' : '…';
    }
  }
}

(async () => {
  await loadAliases();
  await loadProfiles();
  pollStatus();
  setInterval(pollStatus, 10000);
})();
</script>
